# Great Lakes SLEAP pipeline settings.
# On first install, a copy is placed at ~/sleap_gl.conf with your username.
# Edit SLEAP_SLURM_ACCOUNT and email for your lab.

SLEAP_GL_USER="${SLEAP_GL_USER:-YOUR_UNIQNAME}"
SLEAP_SLURM_ACCOUNT="${SLEAP_SLURM_ACCOUNT:-gid0}"
SLEAP_MAIL_USER="${SLEAP_MAIL_USER:-YOUR_UNIQNAME@umich.edu}"
SLEAP_RUN_NAME="${SLEAP_RUN_NAME:-rat_v001}"
SLEAP_TRAINING_ZIP="${SLEAP_TRAINING_ZIP:-labels.v001.slp.training_job.zip}"
SLEAP_LABEL_PROJECT="${SLEAP_LABEL_PROJECT:-labels/rat_project.slp}"

# Work dir on scratch (auto-set by install.sh if omitted).
# OOD nodes may not set $SCRATCH — scripts use this path explicitly.
# SLEAP_SCRATCH_DIR="/scratch/gid_root/gid0/YOUR_UNIQNAME/sleap_rat"

# Pinned SLEAP stack — bump sleap, sleap-io, sleap-nn together.
SLEAP_VERSION="${SLEAP_VERSION:-1.6.1}"
SLEAP_IO_VERSION="${SLEAP_IO_VERSION:-0.6.5}"
SLEAP_NN_VERSION="${SLEAP_NN_VERSION:-0.1.3}"
SLEAP_PYTHON_MODULE="${SLEAP_PYTHON_MODULE:-python/3.11.5}"
SLEAP_GUI_PYTHON_MODULE="${SLEAP_GUI_PYTHON_MODULE:-python/3.11.5}"

# Slurm GPU (Great Lakes requires GPU type, not generic gpu:1).
SLEAP_GPU_PARTITION="${SLEAP_GPU_PARTITION:-gpu}"
SLEAP_GPU_REQUEST="${SLEAP_GPU_REQUEST:-v100:1}"

# GL OOD fixes: Qt 6.5+ needs libxcb-cursor (not on cluster); numpy 2.x breaks PySide6.
SLEAP_PYSIDE6_VERSION="${SLEAP_PYSIDE6_VERSION:-6.4.3}"
# opencv 4.10+ pulls numpy>=2; pin older headless build for GL GUI env.
SLEAP_OPENCV_HEADLESS_VERSION="${SLEAP_OPENCV_HEADLESS_VERSION:-4.8.1.78}"

# Install sleap-nn (+ torch cu118) into sleap_gui_env for GUI "Predict -> Run Training".
# Set to 0 to keep GUI labeling-only (export zip + bash train.sh on Slurm).
SLEAP_GUI_INSTALL_NN="${SLEAP_GUI_INSTALL_NN:-1}"
